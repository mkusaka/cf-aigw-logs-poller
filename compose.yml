services:
  fake-gcs:
    image: fsouza/fake-gcs-server:1.47.7
    ports:
      - "4443:4443"
    command: [
      "-scheme", "http",
      "-host", "0.0.0.0",
      "-port", "4443",
      "-public-host", "localhost:4443"
    ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4443/storage/v1/b"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  test-setup:
    image: curlimages/curl:8.4.0
    depends_on:
      fake-gcs:
        condition: service_healthy
    entrypoint: |
      sh -c '
        # Create test bucket
        curl -X POST "http://fake-gcs:4443/storage/v1/b?project=test-project" \
          -H "Content-Type: application/json" \
          -d "{\"name\": \"test-bucket\"}"
        
        echo "Test bucket created successfully"
      '
    restart: "no"